<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Hybrid | Professional Admission Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #f8fafc; font-family: 'Inter', sans-serif; color: #1e293b; }
        .active-tab { background: #fbbf24; color: #003366; transform: scale(1.05); box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .input-field { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 16px; outline: none; transition: 0.3s; font-size: 14px; }
        .input-field:focus { border-color: #003366; ring: 4px rgba(0,51,102,0.1); }
        #idCard { width: 320px; background: white; border-radius: 24px; overflow: hidden; border: 2px solid #003366; position: relative; }
        .gradient-bg { background: linear-gradient(135deg, #003366 0%, #001a33 100%); }
        #qrModal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px; }
        
        .topper-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px; scrollbar-width: none; -ms-overflow-style: none; }
        .topper-scroll::-webkit-scrollbar { display: none; }
        
        .photo-frame { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fbbf24; overflow: hidden; background: #fff; margin-bottom: 8px; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .photo-frame-anish { width: 85px; height: 85px; border-radius: 12px; border: 3px solid #fbbf24; overflow: hidden; background: #fff; margin-right: 16px; }
        .photo-frame-anish img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header class="gradient-bg text-white pt-10 pb-14 px-6 text-center rounded-b-[50px] shadow-2xl relative">
        <h1 class="text-4xl font-black tracking-tighter uppercase mb-1">Creator Hybrid</h1>
        <p class="text-yellow-400 text-[10px] font-bold uppercase tracking-[4px]">Elite Education Portal</p>
    </header>

    <nav class="mx-6 -mt-8 rounded-2xl shadow-2xl flex p-1 bg-white/80 backdrop-blur-md sticky top-4 z-50">
        <button onclick="changePage('reg')" id="t-reg" class="flex-1 py-3 rounded-xl font-bold text-[10px] active-tab">ADMISSION</button>
        <button onclick="changePage('student')" id="t-student" class="flex-1 py-3 rounded-xl font-bold text-[10px] text-slate-400">MY CARD</button>
        <button onclick="changePage('admin')" id="t-admin" class="flex-1 py-3 rounded-xl font-bold text-[10px] text-slate-400">ADMIN</button>
    </nav>

    <main class="p-5 max-w-lg mx-auto mb-12">
        <div id="page-reg">
            <div class="glass-card p-5 rounded-[30px] mb-6 border-b-4 border-blue-600 shadow-lg">
                <h3 class="text-center font-black text-[#003366] text-xs uppercase mb-4 tracking-widest">OUR PRIDE TOPPERS</h3>
                
                <div class="flex items-center bg-blue-600 text-white p-4 rounded-2xl mb-4 shadow-md">
                    <div class="photo-frame-anish">
                        <img src="यहाँ_Anish_की_फोटो_का_Direct_Link_पेस्ट_करें" onerror="this.src='https://via.placeholder.com/85?text=AS'">
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-yellow-400 uppercase tracking-widest">Star of Creator</p>
                        <h4 class="text-xl font-black uppercase tracking-tight">Anish Sahani</h4>
                        <p class="text-[11px] opacity-90">12th Class | 93.6% (Year 2023)</p>
                    </div>
                </div>

                <div class="topper-scroll" id="topper-gallery">
                    </div>
            </div>

            <div class="glass-card p-8 rounded-[35px] shadow-2xl border-t-[10px] border-yellow-400">
                <h2 class="text-xl font-black text-[#003366] mb-4">New Batch: 2026-27</h2>
                <form id="regForm" class="space-y-5">
                    <input type="text" id="stu_name" placeholder="Full Name of Student" class="input-field shadow-sm" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="stu_class" placeholder="Class" class="input-field shadow-sm" required>
                        <input type="tel" id="stu_mobile" placeholder="Guardian's Mobile" class="input-field shadow-sm" required>
                    </div>
                    <button type="submit" class="w-full gradient-bg text-white font-black py-5 rounded-2xl shadow-xl uppercase mt-4">Submit Application</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // यहाँ हर छात्र के लिए अपना असली फोटो लिंक पेस्ट करें
        const toppersData = [
            { name: "Shraddha", info: "10th | 90.16%", year: "2022", img: "यहाँ_Shraddha_का_लिंक_पेस्ट_करें" },
            { name: "Satyam Maurya", info: "10th | 86%", year: "2022", img: "यहाँ_Satyam_का_लिंक_पेस्ट_करें" },
            { name: "Shardanand", info: "12th | 92.2%", year: "2023", img: "यहाँ_Shardanand_का_लिंक_पेस्ट_करें" }
        ];

        function initToppers() {
            const container = document.getElementById('topper-gallery');
            if(!container) return;
            container.innerHTML = toppersData.map(t => `
                <div class="flex flex-col items-center min-w-[100px] text-center">
                    <div class="photo-frame">
                        <img src="${t.img}" onerror="this.src='https://via.placeholder.com/80?text=IMG'">
                    </div>
                    <p class="text-[10px] font-black text-[#003366] uppercase leading-tight">${t.name}</p>
                    <p class="text-[8px] font-bold text-slate-500">${t.info}</p>
                    <p class="text-[7px] font-black text-white bg-red-500 rounded px-1.5 py-0.5 mt-1">${t.year}</p>
                </div>
            `).join('');
        }

        window.onload = () => {
            initToppers();
            showPage('reg');
        };

        function showPage(pageId) {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            const target = document.getElementById('page-' + pageId);
            if(target) target.classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            const btn = document.getElementById('t-' + pageId);
            if(btn) btn.classList.add('active-tab');
        }

        function changePage(pageId) {
            showPage(pageId);
            history.pushState({ page: pageId }, "", "#" + pageId);
        }
    </script>
</body>
</html>
