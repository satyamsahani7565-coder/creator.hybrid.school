<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Hybrid | Professional Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        :root { --pw-blue: #1b1e2e; --pw-accent: #5a4bda; --pw-light: #f4f7fe; }
        body { background-color: var(--pw-light); font-family: 'Poppins', sans-serif; }
        .pw-gradient { background: linear-gradient(135deg, #1b1e2e 0%, #3d4465 100%); }
        .active-tab { background: var(--pw-accent); color: white !important; box-shadow: 0 8px 20px rgba(90, 75, 218, 0.3); }
        .pw-card { background: white; border-radius: 24px; border: 1px solid #eef2ff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-pw { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 14px; transition: 0.3s; }
        .input-pw:focus { border-color: var(--pw-accent); outline: none; }
        #idCard { width: 340px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #eee; }
    </style>
</head>
<body class="pb-10">

    <header class="pw-gradient text-white pt-12 pb-24 px-6 text-center rounded-b-[50px] shadow-2xl">
        <h1 class="text-3xl font-black tracking-tight mb-1 uppercase">CREATOR HYBRID</h1>
        <p class="text-indigo-200 text-[10px] font-bold tracking-[3px] uppercase">Elite Education Portal</p>
    </header>

    <nav class="mx-auto max-w-sm -mt-10 px-4 sticky top-4 z-50">
        <div class="bg-white/90 backdrop-blur-lg p-2 rounded-2xl shadow-xl flex gap-2 border border-white">
            <button onclick="changePage('reg')" id="t-reg" class="flex-1 py-3 rounded-xl font-bold text-[11px] active-tab">ADMISSION</button>
            <button onclick="changePage('student')" id="t-student" class="flex-1 py-3 rounded-xl font-bold text-[11px] text-slate-400">MY CARD</button>
            <button onclick="changePage('admin')" id="t-admin" class="flex-1 py-3 rounded-xl font-bold text-[11px] text-slate-400">ADMIN</button>
        </div>
    </nav>

    <main class="p-6 max-w-lg mx-auto">
        
        <div id="page-reg" class="pw-card p-8 mt-6">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Student Registration</h2>
            <form id="regForm" class="space-y-5">
                <div class="flex flex-col items-center">
                    <div class="relative w-24 h-24 rounded-full border-4 border-dashed border-slate-200 bg-slate-50 flex items-center justify-center overflow-hidden">
                        <input type="file" id="stu_photo" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="previewImage(this)">
                        <img id="preview" class="hidden w-full h-full object-cover">
                        <i id="upload-icon" class="fas fa-camera text-slate-300 text-xl"></i>
                    </div>
                </div>
                <input type="text" id="stu_name" placeholder="Full Student Name" class="input-pw" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="stu_class" placeholder="Class" class="input-pw" required>
                    <input type="tel" id="stu_mobile" placeholder="Mobile" class="input-pw" required>
                </div>
                <input type="password" id="stu_pass" placeholder="Create Password" class="input-pw" required>
                <button type="submit" class="w-full bg-[#5a4bda] text-white py-4 rounded-xl font-bold uppercase shadow-lg">Submit Admission</button>
            </form>
        </div>

        <div id="page-student" class="hidden pw-card p-8 mt-6 text-center">
            <h2 class="text-lg font-bold mb-6">Student ID Card</h2>
            <div id="login-box" class="space-y-4 mb-6">
                <input type="tel" id="login_mob" placeholder="Mobile Number" class="input-pw text-center">
                <input type="password" id="login_pass" placeholder="Password" class="input-pw text-center">
                <button onclick="studentLogin()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold uppercase">Generate ID</button>
            </div>
            
            <div id="id-container" class="hidden flex flex-col items-center">
                <div id="idCard" class="text-left">
                    <div class="pw-gradient p-6 text-white">
                        <p class="text-[8px] font-bold text-indigo-300 tracking-[2px]">CREATOR HYBRID</p>
                        <h4 class="font-extrabold text-lg">STUDENT IDENTITY</h4>
                    </div>
                    <div class="p-6 flex items-center gap-4">
                        <img id="id-p" src="" class="w-20 h-20 rounded-xl object-cover border-2 border-slate-50 shadow-sm">
                        <div>
                            <h3 id="id-n" class="text-md font-bold text-slate-800"></h3>
                            <p id="id-c" class="text-xs font-bold text-indigo-600"></p>
                            <p id="id-m" class="text-[10px] text-slate-500 font-bold mt-1"></p>
                        </div>
                    </div>
                    <div class="px-6 pb-6"><div class="bg-emerald-50 text-emerald-600 text-center py-2 rounded-lg text-[9px] font-bold uppercase">✅ Verified Status</div></div>
                </div>
                <button onclick="downloadID()" class="mt-6 text-indigo-600 font-bold text-xs uppercase underline">Download Image</button>
            </div>
        </div>

        <div id="page-admin" class="hidden pw-card p-8 mt-6 text-center">
            <h2 class="text-lg font-bold mb-4">Admin Login</h2>
            <input type="password" id="adm_pass" placeholder="Secure Code" class="input-pw text-center mb-4">
            <button onclick="adminLogin()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold uppercase">Access Portal</button>
        </div>

        <div id="page-panel" class="hidden pw-card p-6 mt-6">
            <h2 class="text-xs font-black text-slate-400 mb-4 uppercase">Student Database</h2>
            <div id="admin-list" class="space-y-3"></div>
        </div>

    </main>

    <script>
        const MASTER_PASS = "Abhay@1234";
        let db = JSON.parse(localStorage.getItem('ch_pro_db')) || [];
        let tempPhoto = "";

        function showPage(pageId) {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById('t-' + pageId).classList.add('active-tab');
            if(pageId === 'panel') renderAdmin();
        }

        function changePage(pageId) { showPage(pageId); }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    document.getElementById('preview').src = e.target.result; 
                    document.getElementById('preview').classList.remove('hidden'); 
                    document.getElementById('upload-icon').classList.add('hidden');
                    tempPhoto = e.target.result; 
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const s = {
                name: document.getElementById('stu_name').value,
                class: document.getElementById('stu_class').value,
                mobile: document.getElementById('stu_mobile').value,
                pass: document.getElementById('stu_pass').value,
                photo: tempPhoto || 'https://via.placeholder.com/150'
            };
            db.push(s);
            localStorage.setItem('ch_pro_db', JSON.stringify(db));
            alert("Admission Done! Now login to see ID Card.");
            document.getElementById('login_mob').value = s.mobile;
            document.getElementById('login_pass').value = s.pass;
            changePage('student');
        };

        function studentLogin() {
            const m = document.getElementById('login_mob').value;
            const p = document.getElementById('login_pass').value;
            const s = db.find(x => x.mobile === m && x.pass === p);
            if(!s) { alert("Wrong details!"); return; }
            document.getElementById('id-n').innerText = s.name.toUpperCase();
            document.getElementById('id-c').innerText = "CLASS: " + s.class;
            document.getElementById('id-m').innerText = "MOB: " + s.mobile;
            document.getElementById('id-p').src = s.photo;
            document.getElementById('id-container').classList.remove('hidden');
            document.getElementById('login-box').classList.add('hidden');
        }

        function downloadID() {
            html2canvas(document.getElementById('idCard')).then(canvas => {
                const link = document.createElement('a');
                link.download = `Student_ID.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function adminLogin() {
            if(document.getElementById('adm_pass').value === MASTER_PASS) changePage('panel');
            else alert("Error!");
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = db.length === 0 ? "Empty" : 
            db.map((s, i) => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <div class="flex items-center gap-3">
                        <img src="${s.photo}" class="w-10 h-10 rounded-lg object-cover">
                        <p class="text-[11px] font-bold">${s.name}</p>
                    </div>
                    <button onclick="deleteEntry(${i})" class="text-red-300"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function deleteEntry(i) { db.splice(i,1); localStorage.setItem('ch_pro_db', JSON.stringify(db)); renderAdmin(); }
        window.onload = () => showPage('reg');
    </script>
</body>
</html>
